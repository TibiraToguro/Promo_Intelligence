<style>
  :root { --accent: #00FF87; --bg: #0A0A0A; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; background: var(--bg); color: #EFEFEF; font-family: -apple-system, system-ui, sans-serif; }
  #app { min-height: 100%; width: 100%; }
  @keyframes spin { to { transform: rotate(360deg); } }

<body>
<div id="app"></div>
<div id="offline-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#FF3B5C;color:#fff;text-align:center;padding:8px;font-size:11px;font-weight:800;z-index:9999;letter-spacing:1px">SEM CONEXÃO</div>

<script>
  // Service Worker & Monitor de Versão
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js?v=1.5.0').catch(()=>{});
  }

  async function checkVersion() {
    try {
      const res = await fetch('/version?t=' + Date.now());
      const data = await res.json();
      if (data.ok && data.version && data.version !== window.APP_VERSION) {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (let reg of regs) { await reg.update(); }
        }
        location.reload(true);
      }
    } catch(e) {}
  }
  setInterval(checkVersion, 300000);
</script>
</body>
